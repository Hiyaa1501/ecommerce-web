spring.application.name=ecommerce

# 1. Port Configuration (Critical for Render)
server.port=${PORT:8080}

# 2. Database Connection
# On Render, set SPRING_DATASOURCE_URL to your Aiven link + ?useSSL=true
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/emply}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:hiya15}

# 3. Hibernate & JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true

# 4. Connection Pooling
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5