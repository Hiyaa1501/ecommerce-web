spring.application.name=ecommerce

# --- Dynamic Database Connection Settings ---
# On Render, it will use the environment variables you set. 
# On your laptop, it will default back to localhost:3306/emply.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/emply?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:hiya15}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate Settings ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# This line is the MAGIC fix for Render's Dialect error
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# --- Initialization Settings ---
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true