spring.application.name=ecommerce

# 1. Port Configuration (Critical for Render)
# Defaults to 8080 locally, but uses Render's dynamic port (10000) in production
server.port=${PORT:8080}

# 2. Database Connection
# The "jdbc:" prefix is mandatory for Spring Boot. 
# It will use your Aiven URL from Render's config, or your local DB if not found.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/emply}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:hiya15}

# 3. Hibernate & JPA Settings
# 'update' will automatically create your tables in the Aiven cloud database
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# 4. Connection Pooling (Optional but recommended for stability)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5