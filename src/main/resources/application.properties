spring.application.name=ecommerce

# --- Database Connection Settings ---
# Note: Ensure the database 'emply' actually exists in your MySQL Workbench
spring.datasource.url=jdbc:mysql://localhost:3306/emply?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=hiya15
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate Settings ---
# Let Hibernate detect the Dialect automatically - I removed the MySQL8Dialect line
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Initialization Settings ---
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true