<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIE Store | 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="nav-brand">
            <div class="brand-icon">H</div>
            <div>
                <div class="brand-name">HIE Store</div>
                <div class="brand-sub">Premium Collection 2026</div>
            </div>
        </div>
        <div class="search-wrap">
            <span class="search-icon">&#9906;</span>
            <input type="text" id="search" placeholder="Search products..." onkeyup="searchProducts()">
        </div>
        <div class="nav-cart-info">
            <span class="cart-badge" id="cart-count">0 items</span>
        </div>
    </header>
 
    <main class="container">
 
        <section class="form-container">
            <div class="section-header">
                <h3>Add to Store</h3>
                <span class="section-hint">Select a product below to get started</span>
            </div>
 
            <div class="selection-gallery">
                <div class="selectable-item" onclick="selectTemplate('Iphone', event)">
                    <div class="img-wrapper"><img src="https://images.unsplash.com/photo-1510557880182-3d4d3cba35a5?w=150" alt="iPhone"></div>
                    <span>iPhone</span>
                </div>
                <div class="selectable-item" onclick="selectTemplate('Laptop', event)">
                    <div class="img-wrapper"><img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=150" alt="Laptop"></div>
                    <span>Laptop</span>
                </div>
                <div class="selectable-item" onclick="selectTemplate('Android Phone', event)">
                    <div class="img-wrapper"><img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=150" alt="Android"></div>
                    <span>Android</span>
                </div>
                <div class="selectable-item" onclick="selectTemplate('OnePlus Buds', event)">
                    <div class="img-wrapper"><img src="https://images.unsplash.com/photo-1590658268037-6bf12165a8df?w=150" alt="Buds"></div>
                    <span>Buds</span>
                </div>
                <div class="selectable-item" onclick="selectTemplate('Smart Watch', event)">
                    <div class="img-wrapper"><img src="https://img.icons8.com/color/96/apple-watch-apps.png" alt="Watch"></div>
                    <span>Watch</span>
                </div>
                <div class="selectable-item" onclick="selectTemplate('Backpack', event)">
                    <div class="img-wrapper"><img src="https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=150" alt="Backpack"></div>
                    <span>Backpack</span>
                </div>
                <div class="selectable-item" onclick="selectTemplate('Top', event)">
                    <div class="img-wrapper"><img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?w=150" alt="Top"></div>
                    <span>Top</span>
                </div>
                <div class="selectable-item" onclick="selectTemplate('Sneakers', event)">
                    <div class="img-wrapper"><img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=150" alt="Sneakers"></div>
                    <span>Sneakers</span>
                </div>
                <div class="selectable-item" onclick="selectTemplate('Sunglasses', event)">
                    <div class="img-wrapper"><img src="https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=150" alt="Glasses"></div>
                    <span>Glasses</span>
                </div>
            </div>
 
            <div class="add-bar">
                <div class="add-bar-field">
                    <label>Product</label>
                    <input type="text" id="nameInput" readonly placeholder="Select from above">
                </div>
                <div class="add-bar-field">
                    <label>Price (₹)</label>
                    <input type="number" id="priceInput" placeholder="e.g. 5000">
                </div>
                <input type="hidden" id="categoryInput">
                <button id="addBtn" onclick="addProduct()" disabled>
                    <span>+</span> Add to Store
                </button>
            </div>
        </section>
 
        <div class="main-content">
            <div class="products-section">
                <div class="products-header">
                    <h3>Store Inventory</h3>
                    <span id="product-count" class="product-count-badge">0 products</span>
                </div>
                <div id="product-list" class="product-grid"></div>
            </div>
 
            <aside class="cart-section">
                <div class="cart-header">
                    <h3>Your Cart</h3>
                    <span class="cart-icon">&#128722;</span>
                </div>
                <ul id="cart"></ul>
                <div class="cart-empty" id="cart-empty-msg">
                    <div class="empty-icon">&#128722;</div>
                    <p>Your cart is empty</p>
                </div>
                <div class="cart-footer">
                    <div id="cart-total"><span>Total</span><strong>₹0.00</strong></div>
                    <button class="btn-checkout" onclick="checkout()">Place Order &#8594;</button>
                </div>
            </aside>
        </div>
    </main>
 
    <div id="toast" class="toast"></div>
 
    <script src="script.js"></script>
</body>
</html>
